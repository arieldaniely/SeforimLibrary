name: Build Book Importer Portable

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-portable:
    name: Build Windows portable package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Book Importer Portable
        run: .\gradlew.bat packageBookImporterWindowsPortable --no-daemon --stacktrace

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seforim-book-importer-portable
          path: |
            generator/bookimporter/build/compose/binaries/main-release/portable/*.zip
          if-no-files-found: error
          retention-days: 14
